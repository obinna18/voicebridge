<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceBridge — Real-Time Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080b10;
    --surface: #0e1420;
    --surface2: #141c2e;
    --border: #1e2d4a;
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --warn: #ff6b35;
    --text: #e8edf5;
    --muted: #4a5a78;
    --live: #00ff88;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
  }

  /* Animated bg grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridDrift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(123,97,255,0.08) 0%, transparent 70%);
    animation: pulse 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridDrift {
    from { background-position: 0 0; }
    to { background-position: 40px 40px; }
  }

  @keyframes pulse {
    from { transform: scale(1) translate(0,0); opacity: 0.5; }
    to { transform: scale(1.2) translate(5%,5%); opacity: 1; }
  }

  /* LAYOUT */
  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    max-width: 520px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* HEADER */
  header {
    padding: 24px 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--accent);
    position: relative;
    overflow: hidden;
  }

  .logo-icon::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.15), transparent);
  }

  .logo-name {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo-name span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 20px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .status-dot.live {
    background: var(--live);
    box-shadow: 0 0 6px var(--live);
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* MAIN */
  main {
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    padding: 4px 0;
  }

  main::-webkit-scrollbar { width: 3px; }
  main::-webkit-scrollbar-track { background: transparent; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* LANGUAGE SELECTOR */
  .lang-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }

  .lang-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  .panel-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .lang-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
  }

  .lang-select-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .lang-sublabel {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 12px;
    border-radius: 10px;
    outline: none;
    cursor: pointer;
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }

  select:focus { border-color: var(--accent); }

  .swap-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--accent);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    margin-top: 16px;
  }

  .swap-btn:hover {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    transform: rotate(180deg);
  }

  /* OUTPUT CARD */
  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .output-card.has-content {
    border-color: rgba(0,229,255,0.3);
  }

  .output-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .output-original {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 10px;
    min-height: 20px;
    transition: all 0.3s;
  }

  .output-translation {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
    min-height: 30px;
    transition: all 0.3s;
  }

  .output-translation.active {
    color: var(--accent);
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* WAVEFORM */
  .wave-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .wave-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .waveform {
    flex: 1;
    height: 32px;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .wave-bar {
    flex: 1;
    background: var(--border);
    border-radius: 2px;
    height: 4px;
    transition: height 0.1s ease;
  }

  .wave-bar.active {
    background: var(--accent);
    animation: waveAnim 0.8s ease-in-out infinite alternate;
  }

  @keyframes waveAnim {
    from { height: 4px; }
    to { height: var(--h, 20px); }
  }

  /* HISTORY */
  .history-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .history-list::-webkit-scrollbar { width: 2px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); }

  .history-item {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 12px;
    border-left: 2px solid var(--accent2);
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .history-item-original {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-bottom: 4px;
    font-style: italic;
  }

  .history-item-translation {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }

  .history-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
  }

  /* FOOTER / MIC BUTTON */
  footer {
    padding: 16px 0 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .mic-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mic-ring {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.3s;
  }

  .mic-ring.pulse {
    animation: ringPulse 1.5s ease-out infinite;
    opacity: 1;
  }

  @keyframes ringPulse {
    0% { transform: scale(0.9); opacity: 0.7; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .mic-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    transition: all 0.2s;
    box-shadow: 0 8px 32px rgba(0,229,255,0.2);
  }

  .mic-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 12px 40px rgba(0,229,255,0.35);
  }

  .mic-btn.recording {
    background: linear-gradient(135deg, var(--warn), #ff3b6b);
    box-shadow: 0 8px 32px rgba(255,107,53,0.3);
  }

  .mic-hint {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* PROCESSING INDICATOR */
  .processing {
    display: none;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .processing.show { display: flex; }

  .spin {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(0,229,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ERROR */
  .error-msg {
    display: none;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--warn);
    text-align: center;
    padding: 6px;
  }

  .error-msg.show { display: block; }

  /* TTS button */
  .tts-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s;
  }

  .tts-btn:hover { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">⟁</div>
      <div class="logo-name">Voice<span>Bridge</span></div>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">STANDBY</span>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- LANGUAGE PANEL -->
    <div class="lang-panel">
      <div class="panel-label">// Translation Route</div>
      <div class="lang-row">
        <div class="lang-select-wrap">
          <span class="lang-sublabel">From</span>
          <select id="sourceLang">
            <option value="auto">Auto Detect</option>
            <option value="en-US">English</option>
            <option value="hi-IN">Hindi</option>
            <option value="ta-IN">Tamil</option>
            <option value="te-IN">Telugu</option>
            <option value="fr-FR">French</option>
            <option value="es-ES">Spanish</option>
            <option value="de-DE">German</option>
            <option value="zh-CN">Mandarin</option>
            <option value="ar-SA">Arabic</option>
            <option value="pt-BR">Portuguese</option>
            <option value="yo-NG">Yoruba</option>
            <option value="ig-NG">Igbo</option>
            <option value="ha-NG">Hausa</option>
            <option value="sw-KE">Swahili</option>
            <option value="ja-JP">Japanese</option>
            <option value="ko-KR">Korean</option>
          </select>
        </div>

        <button class="swap-btn" id="swapBtn" title="Swap languages">⇄</button>

        <div class="lang-select-wrap">
          <span class="lang-sublabel">To</span>
          <select id="targetLang">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="zh">Mandarin</option>
            <option value="ar">Arabic</option>
            <option value="pt">Portuguese</option>
            <option value="yo">Yoruba</option>
            <option value="ig">Igbo</option>
            <option value="ha">Hausa</option>
            <option value="sw">Swahili</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
          </select>
        </div>
      </div>
    </div>

    <!-- OUTPUT CARD -->
    <div class="output-card" id="outputCard">
      <div class="output-top">
        <span class="panel-label">// Live Output</span>
        <div style="display:flex;gap:8px;">
          <button class="tts-btn" id="ttsBtn">▶ Speak</button>
          <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
      </div>
      <div class="output-original" id="originalText">Waiting for speech...</div>
      <div class="output-translation" id="translatedText">—</div>
      <div class="processing" id="processingIndicator">
        <div class="spin"></div>
        TRANSLATING
      </div>
    </div>

    <!-- WAVEFORM -->
    <div class="wave-container">
      <span class="wave-label">Signal</span>
      <div class="waveform" id="waveform"></div>
    </div>

    <!-- HISTORY -->
    <div class="history-panel">
      <div class="panel-label">// Session Log</div>
      <div class="history-list" id="historyList">
        <div class="history-empty" id="historyEmpty">NO ENTRIES YET</div>
      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="error-msg" id="errorMsg"></div>
    <div class="mic-wrap">
      <div class="mic-ring" id="micRing"></div>
      <button class="mic-btn" id="micBtn">🎙</button>
    </div>
    <div class="mic-hint" id="micHint">TAP TO LISTEN</div>
  </footer>

</div>

<script>
  // Build waveform bars
  const waveform = document.getElementById('waveform');
  const bars = [];
  for (let i = 0; i < 28; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    waveform.appendChild(bar);
    bars.push(bar);
  }

  // State
  let isRecording = false;
  let recognition = null;
  let waveInterval = null;
  let currentTranslation = '';
  const history = [];

  // Elements
  const micBtn = document.getElementById('micBtn');
  const micRing = document.getElementById('micRing');
  const micHint = document.getElementById('micHint');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const originalText = document.getElementById('originalText');
  const translatedText = document.getElementById('translatedText');
  const outputCard = document.getElementById('outputCard');
  const processingIndicator = document.getElementById('processingIndicator');
  const errorMsg = document.getElementById('errorMsg');
  const historyList = document.getElementById('historyList');
  const historyEmpty = document.getElementById('historyEmpty');
  const sourceLang = document.getElementById('sourceLang');
  const targetLang = document.getElementById('targetLang');
  const copyBtn = document.getElementById('copyBtn');
  const ttsBtn = document.getElementById('ttsBtn');
  const swapBtn = document.getElementById('swapBtn');

  // Language code maps
  const sourceToTarget = {
    'auto': 'auto', 'en-US': 'en', 'hi-IN': 'hi', 'ta-IN': 'ta',
    'te-IN': 'te', 'fr-FR': 'fr', 'es-ES': 'es', 'de-DE': 'de',
    'zh-CN': 'zh', 'ar-SA': 'ar', 'pt-BR': 'pt', 'yo-NG': 'yo',
    'ig-NG': 'ig', 'ha-NG': 'ha', 'sw-KE': 'sw', 'ja-JP': 'ja', 'ko-KR': 'ko'
  };

  const targetToSource = {
    'en': 'en-US', 'hi': 'hi-IN', 'ta': 'ta-IN', 'te': 'te-IN',
    'fr': 'fr-FR', 'es': 'es-ES', 'de': 'de-DE', 'zh': 'zh-CN',
    'ar': 'ar-SA', 'pt': 'pt-BR', 'yo': 'yo-NG', 'ig': 'ig-NG',
    'ha': 'ha-NG', 'sw': 'sw-KE', 'ja': 'ja-JP', 'ko': 'ko-KR'
  };

  // Swap langs
  swapBtn.addEventListener('click', () => {
    const src = sourceLang.value;
    const tgt = targetLang.value;
    if (src === 'auto') return;
    const newSrc = targetToSource[tgt] || 'en-US';
    const newTgt = sourceToTarget[src] || 'en';
    sourceLang.value = newSrc;
    targetLang.value = newTgt;
  });

  // Animate waveform
  function startWave() {
    bars.forEach(b => b.classList.add('active'));
    waveInterval = setInterval(() => {
      bars.forEach(bar => {
        const h = Math.random() * 24 + 4;
        bar.style.setProperty('--h', h + 'px');
        bar.style.animationDuration = (Math.random() * 0.4 + 0.5) + 's';
      });
    }, 150);
  }

  function stopWave() {
    clearInterval(waveInterval);
    bars.forEach(b => {
      b.classList.remove('active');
      b.style.removeProperty('--h');
    });
  }

  // Translate using MyMemory (free, no key needed)
  async function translate(text, sourceLangCode, targetLangCode) {
    const src = sourceLangCode === 'auto' ? 'auto' : sourceLangCode.split('-')[0];
    const tgt = targetLangCode;
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`;
    try {
      const res = await fetch(url);
      const data = await res.json();
      if (data.responseStatus === 200) {
        return data.responseData.translatedText;
      }
      return '[Translation failed]';
    } catch (e) {
      return '[Network error]';
    }
  }

  // Add to history
  function addHistory(original, translated) {
    historyEmpty.style.display = 'none';
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div class="history-item-original">${original}</div>
      <div class="history-item-translation">${translated}</div>
    `;
    historyList.prepend(item);
    history.unshift({ original, translated });
    if (history.length > 20) {
      historyList.lastChild?.remove();
      history.pop();
    }
  }

  // Show error
  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
    setTimeout(() => errorMsg.classList.remove('show'), 4000);
  }

  // Setup Speech Recognition
  function setupRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      showError('Speech recognition not supported in this browser. Try Chrome.');
      return null;
    }

    const r = new SpeechRecognition();
    r.continuous = true;
    r.interimResults = true;
    r.lang = sourceLang.value === 'auto' ? 'en-US' : sourceLang.value;

    r.onstart = () => {
      statusDot.classList.add('live');
      statusText.textContent = 'LIVE';
      micBtn.classList.add('recording');
      micBtn.textContent = '⏹';
      micRing.classList.add('pulse');
      micHint.textContent = 'TAP TO STOP';
      startWave();
    };

    r.onend = () => {
      if (isRecording) {
        // Auto restart if still recording
        try { r.start(); } catch(e) {}
      }
    };

    r.onresult = async (event) => {
      let interim = '';
      let final = '';

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          final += transcript;
        } else {
          interim += transcript;
        }
      }

      const display = final || interim;
      originalText.textContent = display || 'Listening...';

      if (final.trim()) {
        processingIndicator.classList.add('show');
        translatedText.textContent = '...';
        translatedText.classList.remove('active');

        const tgt = targetLang.value;
        const src = sourceLang.value;
        const result = await translate(final.trim(), src, tgt);

        translatedText.textContent = result;
        translatedText.classList.add('active');
        currentTranslation = result;
        outputCard.classList.add('has-content');
        processingIndicator.classList.remove('show');

        addHistory(final.trim(), result);

        // Auto speak translation
        speakText(result, tgt);
      }
    };

    r.onerror = (event) => {
      if (event.error === 'not-allowed') {
        showError('Microphone access denied. Please allow mic access.');
        stopRecording();
      } else if (event.error !== 'no-speech') {
        showError(`Error: ${event.error}`);
      }
    };

    return r;
  }

  // TTS
  function speakText(text, langCode) {
    if (!window.speechSynthesis || !text || text === '—') return;
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = langCode;
    utterance.rate = 0.95;
    speechSynthesis.speak(utterance);
  }

  function stopRecording() {
    isRecording = false;
    if (recognition) { try { recognition.stop(); } catch(e) {} }
    statusDot.classList.remove('live');
    statusText.textContent = 'STANDBY';
    micBtn.classList.remove('recording');
    micBtn.textContent = '🎙';
    micRing.classList.remove('pulse');
    micHint.textContent = 'TAP TO LISTEN';
    stopWave();
  }

  // Mic button
  micBtn.addEventListener('click', () => {
    if (isRecording) {
      stopRecording();
    } else {
      recognition = setupRecognition();
      if (!recognition) return;
      isRecording = true;
      try { recognition.start(); } catch(e) { showError('Could not start mic.'); isRecording = false; }
    }
  });

  // Copy
  copyBtn.addEventListener('click', () => {
    if (currentTranslation) {
      navigator.clipboard.writeText(currentTranslation).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy', 1500);
      });
    }
  });

  // Manual TTS
  ttsBtn.addEventListener('click', () => {
    speakText(currentTranslation, targetLang.value);
  });
</script>
</body>
</html>
